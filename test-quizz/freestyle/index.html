<!doctype html>
<html lang="fr-FR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vive la Forge</title>
        <meta
            name="description"
            content="En arrivant dans ce lycéé², tu découvres une forge secrète. En l’activant, tu libères un esprit qui te propose de relever un défi : deviner dans lequel de ces films cet objet est présent."
        />
        <link rel="stylesheet" href="reset.css" />
        <link rel="stylesheet" href="style.css" />
        <link rel="shortcut icon" href="favicon.png" type="image/png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <header>
            <div class="icon-container">
                <img
                    src="./img/volume-icon.svg"
                    alt="icon de volume"
                    class="icon-left"
                />
                <div class="icon-right">
                    <img src="./img/puzzle-vector.png" alt="" />
                    <p class="score-counter">0/22</p>
                </div>
            </div>
        </header>
        <main>
            <div class="quiz-container">
                <h1 class="quiz-title">
                    DANS LEQUEL DE CES FILMS CET OBJET EST PRÉSENT ?
                </h1>
                <div class="model-viewport">
                    <div id="canvas-container">
                        <p class="placeholder-text">modèle en 3d</p>
                    </div>
                </div>
                <div class="answers-group">
                    <button class="answer-btn">Le vent se lève</button>
                    <button class="answer-btn">Kiki la petite sorcière</button>
                    <button class="answer-btn">Le château dans le ciel</button>
                </div>
                <button class="submit-btn">valider</button>
            </div>
        </main>
    </body>
</html>
