<!doctype html>
<html lang="fr-FR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>anecdote</title>
        <meta
            name="description"
            content="Phrase descriptive d’environ 160 caractères"
        />
        <link rel="stylesheet" href="reset.css" />
        <link rel="stylesheet" href="style.css" />
        <link rel="shortcut icon" href="favicon.png" type="image/png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <header>
            <div class="icon-container">
                <img
                    src="./img/volume-icon.svg"
                    alt="icon de volume"
                    class="icon-left"
                />
                <div class="icon-right">
                    <img src="./img/puzzle-vector.png" alt="" />
                    <p class="score-counter">0/22</p>
                </div>
            </div>
        </header>
        <main>
            <div class="quiz-container">
                <h1 class="quiz-title">ANECDOTE</h1>
                <div class="model-viewport">
                    <div id="canvas-container">
                        <p class="placeholder-text">Arc de Mahito</p>
                    </div>
                </div>
                <div class="anecdote">
                    <p>
                        Quand on parle du Roi Dagobert qui a mis sa culotte à
                        l’envers on parle pas d’une culotte genre un slip mais
                        d’un pantalon, en effet à l’époque on appelait ça comme
                        ça
                    </p>
                </div>
                <button class="submit-btn">valider</button>
            </div>
        </main>
    </body>
</html>
